<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bob Guardrail — Governance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ---- IBM Carbon-flavored tokens ---- */
  :root{
    --bg:#f4f4f4; --layer:#ffffff; --layer-hover:#e8e8e8; --field:#ffffff;
    --border:#e0e0e0; --border-strong:#c6c6c6;
    --text:#161616; --text-2:#525252; --text-3:#6f6f6f;
    --blue:#0f62fe; --blue-2:#4589ff;
    --ok:#24a148; --blocked:#da1e28;
    --crit:#da1e28; --high:#ff832b; --med:#f1c21b; --low:#8d8d8d; --none:#24a148;
    --mono:'IBM Plex Mono','SF Mono',ui-monospace,monospace;
    --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#161616; --layer:#262626; --layer-hover:#333333; --field:#262626;
      --border:#393939; --border-strong:#525252;
      --text:#f4f4f4; --text-2:#c6c6c6; --text-3:#a8a8a8;
      --ok:#42be65; --blocked:#fa4d56; --crit:#fa4d56; --high:#ff832b; --med:#f1c21b;
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 16px 64px;}
  a{color:var(--blue);text-decoration:none;} a:hover{text-decoration:underline;}
  .mono{font-family:var(--mono);}

  /* ---- masthead ---- */
  header.top{border-bottom:1px solid var(--border);background:var(--layer);}
  .top-in{max-width:1240px;margin:0 auto;padding:18px 16px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;}
  .eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);font-weight:600;margin-bottom:4px;}
  h1{font-size:22px;font-weight:600;margin:0;letter-spacing:-.01em;}
  h1 b{font-weight:700;}
  .tagline{color:var(--text-3);font-size:13px;margin-top:3px;}
  .live{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-3);font-family:var(--mono);}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 color-mix(in srgb,var(--ok) 60%,transparent);animation:p 2s infinite;}
  @keyframes p{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--ok) 55%,transparent);}70%{box-shadow:0 0 0 6px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
  @media (prefers-reduced-motion:reduce){.pulse{animation:none;}}

  /* ---- KPI strip ---- */
  .kpis{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-top:24px;}
  @media (max-width:900px){.kpis{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:520px){.kpis{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:var(--layer);padding:16px 18px;position:relative;}
  .kpi .lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);}
  .kpi .val{font-size:30px;font-weight:600;font-family:var(--mono);margin-top:6px;letter-spacing:-.02em;line-height:1;}
  .kpi.pass .val{color:var(--ok);} .kpi.fail .val{color:var(--blocked);}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;}
  .kpi.pass::before{background:var(--ok);} .kpi.fail::before{background:var(--blocked);} .kpi.accent::before{background:var(--blue);}

  /* ---- panels ---- */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
  @media (max-width:820px){.cols{grid-template-columns:1fr;}}
  .panel{background:var(--layer);border:1px solid var(--border);}
  .panel > h2{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-2);font-weight:600;margin:0;padding:14px 16px;border-bottom:1px solid var(--border);}
  .panel .body{padding:8px 16px 14px;}

  /* by-rule: full names, no truncation */
  .rule-row{display:grid;grid-template-columns:1fr auto;gap:4px 12px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--border);}
  .rule-row:last-child{border-bottom:none;}
  .rule-name{font-weight:500;} .rule-name small{color:var(--text-3);font-family:var(--mono);font-weight:400;}
  .rule-count{font-family:var(--mono);color:var(--text-2);font-weight:500;}
  .rule-bar{grid-column:1/-1;height:6px;background:var(--bg);margin-top:2px;}
  .rule-bar > span{display:block;height:100%;background:var(--blue);}

  /* by-contributor table */
  table.who{width:100%;border-collapse:collapse;}
  table.who th{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);font-weight:600;text-align:left;padding:8px;border-bottom:1px solid var(--border);}
  table.who td{padding:9px 8px;border-bottom:1px solid var(--border);}
  table.who tr:last-child td{border-bottom:none;}
  table.who td.num{font-family:var(--mono);text-align:right;}
  .who-name{display:flex;align-items:center;gap:9px;font-weight:500;}
  .avatar{width:24px;height:24px;background:var(--blue);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:var(--mono);flex:0 0 auto;}
  .chip-pass{color:var(--ok);font-family:var(--mono);} .chip-fail{color:var(--blocked);font-family:var(--mono);}

  /* ---- controls ---- */
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:22px 0 12px;}
  select,input[type=search]{font-family:var(--sans);font-size:13px;background:var(--field);color:var(--text);border:1px solid var(--border-strong);border-bottom:1px solid var(--text-3);border-radius:0;padding:8px 10px;}
  input[type=search]{flex:1;min-width:180px;}
  select:focus,input:focus{outline:2px solid var(--blue);outline-offset:-2px;}
  .seg{display:inline-flex;border:1px solid var(--border-strong);}
  .seg button{font-family:var(--sans);font-size:12px;font-weight:500;background:var(--field);color:var(--text-2);border:none;padding:8px 14px;cursor:pointer;}
  .seg button + button{border-left:1px solid var(--border-strong);}
  .seg button[aria-pressed="true"]{background:var(--blue);color:#fff;}

  /* ---- event feed ---- */
  .group-hd{display:flex;align-items:center;gap:10px;margin:22px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--border-strong);}
  .group-hd .avatar{width:26px;height:26px;}
  .group-hd .who-lab{font-weight:600;font-size:15px;}
  .group-hd .who-stat{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text-3);}
  .evt{background:var(--layer);border:1px solid var(--border);border-left:3px solid var(--border-strong);margin-bottom:8px;}
  .evt.PASS{border-left-color:var(--ok);} .evt.FAIL,.evt.ERROR,.evt.UNPARSEABLE{border-left-color:var(--blocked);}
  .evt > summary{list-style:none;cursor:pointer;padding:14px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:6px 12px;align-items:center;}
  .evt > summary::-webkit-details-marker{display:none;}
  .evt summary:hover{background:var(--layer-hover);}
  .badges{display:flex;gap:6px;align-items:center;}
  .verdict{font-size:11px;font-weight:600;font-family:var(--mono);padding:3px 9px;letter-spacing:.02em;}
  .verdict.PASS{background:color-mix(in srgb,var(--ok) 16%,transparent);color:var(--ok);}
  .verdict.FAIL,.verdict.ERROR,.verdict.UNPARSEABLE{background:color-mix(in srgb,var(--blocked) 16%,transparent);color:var(--blocked);}
  .sev{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.03em;padding:2px 7px;color:#161616;}
  .sev.critical{background:var(--crit);color:#fff;} .sev.high{background:var(--high);} .sev.medium{background:var(--med);}
  .sev.low{background:var(--low);color:#fff;} .sev.none{background:var(--none);color:#fff;}
  .ev-title{font-weight:600;grid-column:2;}
  .ev-title .prnum{font-family:var(--mono);color:var(--text-3);font-weight:500;margin-right:6px;}
  .ev-count{font-family:var(--mono);font-size:12px;color:var(--text-3);text-align:right;}
  .ev-meta{grid-column:2/-1;display:flex;flex-wrap:wrap;gap:6px 16px;color:var(--text-3);font-size:12px;align-items:center;}
  .ev-meta .who2{display:inline-flex;align-items:center;gap:7px;color:var(--text-2);}
  .ev-meta .avatar{width:18px;height:18px;font-size:9px;}
  .ev-meta b{color:var(--text-2);font-weight:600;}
  .viol{border-top:1px solid var(--border);overflow-x:auto;}
  table.vt{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
  table.vt th{text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);font-weight:600;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
  table.vt td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:top;}
  table.vt tr:last-child td{border-bottom:none;}
  table.vt td.f{font-family:var(--mono);font-size:12px;color:var(--text-2);white-space:nowrap;}
  table.vt td.r{font-family:var(--mono);font-size:12px;color:var(--blue);white-space:nowrap;}
  .empty{text-align:center;color:var(--text-3);padding:56px 20px;border:1px dashed var(--border-strong);background:var(--layer);}
  footer{margin-top:32px;padding-top:14px;border-top:1px solid var(--border);color:var(--text-3);font-size:12px;}
  footer .mono{color:var(--text-2);}
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div>
      <div class="eyebrow">Utility Co AIDLC · IBM Bob</div>
      <h1>Bob Guardrail <b>Governance Dashboard</b></h1>
    </div>
    <div class="live"><span class="pulse" id="pulse"></span><span id="status">loading…</span></div>
  </div>
</header>

<div class="wrap">
  <section class="kpis" id="kpis"></section>

  <div class="cols">
    <div class="panel"><h2>Violations by rule</h2><div class="body" id="byRule"></div></div>
    <div class="panel"><h2>By contributor</h2><div class="body" style="padding:0 16px 6px" id="byUser"></div></div>
  </div>

  <div class="controls">
    <div class="seg" role="group" aria-label="Group by">
      <button id="vEvent" aria-pressed="true">By event</button>
      <button id="vUser" aria-pressed="false">By contributor</button>
    </div>
    <select id="fVerdict"><option value="">All verdicts</option><option>FAIL</option><option>PASS</option><option>ERROR</option></select>
    <select id="fSeverity"><option value="">All severities</option><option>critical</option><option>high</option><option>medium</option><option>low</option></select>
    <select id="fUser"><option value="">All contributors</option></select>
    <input type="search" id="fSearch" placeholder="Search PR, commit, rule, file…" />
  </div>

  <div id="feed"></div>

  <footer>
    Source <a class="mono" href="data/violations.json">data/violations.json</a> · auto-refreshes every 15s ·
    rules pinned from <span class="mono">main</span>, code audited from the PR branch · headless Bob Shell in GitHub Actions.
  </footer>
</div>

<script>
const SEV_RANK={critical:3,high:2,medium:1,low:0,none:-1};
let ALL=[], VIEW="event";

const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=n=>(n||"?").replace(/@.*/,"").split(/[.\-_ ]/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"?";
function ago(ts){const d=(Date.now()-new Date(ts).getTime())/1000;if(isNaN(d))return"";if(d<60)return"just now";if(d<3600)return Math.floor(d/60)+"m ago";if(d<86400)return Math.floor(d/3600)+"h ago";return Math.floor(d/86400)+"d ago";}
// "02-compliance-headers.md" -> {id:"02", name:"compliance-headers"}
function ruleParts(r){const m=String(r||"").replace(/\.md$/,"").match(/^(\d+)-(.+)$/);return m?{id:m[1],name:m[2].replace(/-/g," ")}:{id:"",name:String(r||"unspecified")};}

function kpi(lab,val,cls){return `<div class="kpi ${cls||''}"><div class="lab">${lab}</div><div class="val">${val}</div></div>`;}

function render(){
  const d=ALL, total=d.length;
  const pass=d.filter(r=>r.verdict==="PASS").length;
  const fail=d.filter(r=>r.verdict!=="PASS").length;
  const viol=d.reduce((n,r)=>n+(r.violation_count||0),0);
  const crit=d.reduce((n,r)=>n+(r.violations||[]).filter(v=>v.severity==="critical").length,0);
  const users=new Set(d.map(r=>r.actor).filter(Boolean));
  document.getElementById("kpis").innerHTML=
    kpi("PRs audited",total,"accent")+kpi("Passed",pass,"pass")+kpi("Blocked",fail,"fail")+
    kpi("Pass rate",total?Math.round(pass/total*100)+"%":"—")+kpi("Violations",viol)+
    kpi("Critical",crit,crit?"fail":"")+kpi("Contributors",users.size);

  // violations by rule (full names)
  const rc={};d.forEach(r=>(r.violations||[]).forEach(v=>{const k=v.rule||"unspecified";rc[k]=(rc[k]||0)+1;}));
  const re=Object.entries(rc).sort((a,b)=>b[1]-a[1]);
  const rmax=re.length?re[0][1]:1;
  document.getElementById("byRule").innerHTML=re.length?re.map(([k,n])=>{const p=ruleParts(k);
    return `<div class="rule-row"><span class="rule-name">${esc(p.name)} ${p.id?`<small>${esc(p.id)}</small>`:""}</span><span class="rule-count">${n}</span><span class="rule-bar"><span style="width:${Math.max(4,n/rmax*100)}%"></span></span></div>`;}).join(""):`<div class="rule-row"><span class="rule-name" style="color:var(--text-3)">No violations recorded yet.</span></div>`;

  // by contributor
  const by={};
  d.forEach(r=>{const k=r.actor||"unknown";(by[k]=by[k]||{audited:0,pass:0,fail:0,viol:0});by[k].audited++;r.verdict==="PASS"?by[k].pass++:by[k].fail++;by[k].viol+=r.violation_count||0;});
  const ue=Object.entries(by).sort((a,b)=>b[1].viol-a[1].viol||b[1].audited-a[1].audited);
  document.getElementById("byUser").innerHTML=ue.length?`<table class="who"><thead><tr><th>Contributor</th><th style="text-align:right">Audited</th><th style="text-align:right">Passed</th><th style="text-align:right">Blocked</th><th style="text-align:right">Violations</th></tr></thead><tbody>${ue.map(([u,s])=>`<tr><td><span class="who-name"><span class="avatar">${esc(initials(u))}</span>${esc(u)}</span></td><td class="num">${s.audited}</td><td class="num chip-pass">${s.pass}</td><td class="num chip-fail">${s.fail}</td><td class="num">${s.viol}</td></tr>`).join("")}</tbody></table>`:`<div style="padding:14px 0;color:var(--text-3)">No contributors yet.</div>`;

  // contributor filter
  const sel=document.getElementById("fUser"),cur=sel.value;
  sel.innerHTML=`<option value="">All contributors</option>`+[...users].sort().map(u=>`<option>${esc(u)}</option>`).join("");
  sel.value=cur;
  applyFilters();
}

function eventCard(r){
  const sev=r.severity||(r.verdict==="PASS"?"none":"high");
  const prLink=r.pr_url?`<a href="${esc(r.pr_url)}" target="_blank" rel="noopener">PR #${esc(r.pr_number)}</a>`:`PR #${esc(r.pr_number)}`;
  const vt=(r.violations||[]).length?`<div class="viol"><table class="vt"><thead><tr><th>Severity</th><th>File</th><th>Rule</th><th>Detail</th></tr></thead><tbody>${r.violations.map(v=>`<tr><td><span class="sev ${esc(v.severity||'medium')}">${esc(v.severity||'medium')}</span></td><td class="f">${esc(v.file||'—')}</td><td class="r">${esc((v.rule||'—').replace(/\.md$/,''))}</td><td>${esc(v.detail||'—')}</td></tr>`).join("")}</tbody></table></div>`:"";
  return `<details class="evt ${esc(r.verdict)}" ${r.verdict!=="PASS"?"open":""}>
    <summary>
      <span class="badges"><span class="verdict ${esc(r.verdict)}">${esc(r.verdict)}</span><span class="sev ${esc(sev)}">${esc(sev)}</span></span>
      <span class="ev-title"><span class="prnum">${prLink}</span>${esc(r.pr_title||r.commit_message||"(no title)")}</span>
      <span class="ev-count">${r.violation_count||0} viol.</span>
      <span class="ev-meta">
        <span class="who2"><span class="avatar">${esc(initials(r.actor))}</span><b>${esc(r.actor||"unknown")}</b></span>
        <span>branch <b class="mono">${esc(r.branch||"—")}</b></span>
        <span>commit <b class="mono">${esc(r.sha||"—")}</b></span>
        <span class="mono">${esc((r.commit_message||"").slice(0,54))}</span>
        <span title="${esc(r.timestamp)}">${esc(ago(r.timestamp))}</span>
        ${r.run_url?`<a href="${esc(r.run_url)}" target="_blank" rel="noopener">CI run ↗</a>`:""}
      </span>
    </summary>${vt}
  </details>`;
}

function applyFilters(){
  const fv=document.getElementById("fVerdict").value,fs=document.getElementById("fSeverity").value,
        fu=document.getElementById("fUser").value,q=document.getElementById("fSearch").value.toLowerCase().trim();
  let rows=ALL.filter(r=>{
    if(fv&&(fv==="PASS"?r.verdict!=="PASS":r.verdict!==fv))return false;
    if(fu&&r.actor!==fu)return false;
    if(fs&&!(r.violations||[]).some(v=>v.severity===fs))return false;
    if(q){const b=[r.pr_title,r.commit_message,r.actor,r.branch,r.sha,r.pr_number,...(r.violations||[]).flatMap(v=>[v.rule,v.detail,v.file])].join(" ").toLowerCase();if(!b.includes(q))return false;}
    return true;
  });
  const feed=document.getElementById("feed");
  if(!rows.length){feed.innerHTML=`<div class="empty">No matching audit events.<br>Open a pull request to populate the board.</div>`;return;}

  if(VIEW==="user"){
    const g={};rows.forEach(r=>{(g[r.actor||"unknown"]=g[r.actor||"unknown"]||[]).push(r);});
    feed.innerHTML=Object.entries(g).sort((a,b)=>b[1].length-a[1].length).map(([u,rs])=>{
      const f=rs.filter(r=>r.verdict!=="PASS").length,p=rs.length-f;
      return `<div class="group-hd"><span class="avatar">${esc(initials(u))}</span><span class="who-lab">${esc(u)}</span><span class="who-stat">${rs.length} audited · <span style="color:var(--ok)">${p} passed</span> · <span style="color:var(--blocked)">${f} blocked</span></span></div>${rs.map(eventCard).join("")}`;
    }).join("");
  }else{
    feed.innerHTML=rows.map(eventCard).join("");
  }
}

async function load(){
  try{
    const res=await fetch("data/violations.json",{cache:"no-store"});
    ALL=res.ok?await res.json():[];if(!Array.isArray(ALL))ALL=[];
    ALL.sort((a,b)=>new Date(b.timestamp||0)-new Date(a.timestamp||0));
    document.getElementById("status").textContent=`${ALL.length} audit events · ${new Date().toLocaleTimeString()}`;
    document.getElementById("pulse").style.background="var(--ok)";
  }catch(e){document.getElementById("status").textContent="waiting for first audit";document.getElementById("pulse").style.background="var(--med)";ALL=[];}
  render();
}
function setView(v){VIEW=v;document.getElementById("vEvent").setAttribute("aria-pressed",v==="event");document.getElementById("vUser").setAttribute("aria-pressed",v==="user");applyFilters();}
document.getElementById("vEvent").onclick=()=>setView("event");
document.getElementById("vUser").onclick=()=>setView("user");
["fVerdict","fSeverity","fUser","fSearch"].forEach(id=>document.getElementById(id).addEventListener("input",applyFilters));
load();setInterval(load,15000);
</script>
</body>
</html>
